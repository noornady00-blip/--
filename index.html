<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوقي - Souqi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6b35',
                        primaryHover: '#e85d2b',
                        secondary: '#1e293b',
                        iosDark: '#000000',
                        iosCardDark: '#1c1c1e',
                        iosInputDark: '#2c2c2e',
                    },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Custom Animations for the New Auth Landing Page */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-float-delayed { animation: float 5s ease-in-out 2s infinite; }
        .animate-float-reverse { animation: float 3.5s ease-in-out infinite reverse; }

        /* SOUQI Animated Logo Custom CSS */
        @keyframes text-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes textPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .souqi-logo-anim {
            background: linear-gradient(270deg, #ff6b35, #feca57, #ff9ff3, #4ecdc4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-gradient 4s ease infinite, textPulse 2.5s ease-in-out infinite;
        }

        /* Form Inputs (iOS Style) */
        .input-field {
            width: 100%;
            background-color: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 1rem;
            padding: 0.875rem 1.25rem;
            color: #0f172a;
            transition: all 0.3s ease;
        }
        .dark .input-field { background-color: #2c2c2e; color: white; }
        .input-field:focus { outline: none; border-color: #ff6b35; background-color: #fff; }
        .dark .input-field:focus { background-color: #1c1c1e; }
        
        /* Standard Buttons */
        .btn-primary {
            background-color: #ff6b35; color: white; padding: 0.875rem 1.5rem;
            border-radius: 1rem; font-weight: 700; transition: all 0.2s;
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:hover { background-color: #e85d2b; box-shadow: 0 8px 15px -3px rgba(255, 107, 53, 0.3); }
        
        .btn-secondary {
            background-color: #f1f5f9; color: #1e293b; padding: 0.875rem 1.5rem;
            border-radius: 1rem; font-weight: 700; transition: all 0.2s;
        }
        .dark .btn-secondary { background-color: #2c2c2e; color: white; }
        .btn-secondary:active { transform: scale(0.97); }
        .btn-secondary:hover { background-color: #e2e8f0; }
        .dark .btn-secondary:hover { background-color: #3a3a3c; }

        /* ==================== GRADIENT BUTTON CSS ==================== */
        .gradient-button {
          position: relative;
          padding: 16px 32px;
          font-size: 18px;
          font-weight: bold;
          color: white;
          background: transparent;
          border: none;
          cursor: pointer;
          border-radius: 50px;
          overflow: hidden;
          transition: transform 0.2s ease;
          display: inline-flex;
          justify-content: center;
          align-items: center;
          z-index: 1;
        }
        .gradient-button:hover { transform: scale(1.03); }
        .gradient-button::before {
          content: "";
          position: absolute;
          top: -50%; left: -50%; width: 200%; height: 200%;
          background: conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3, #ff6b6b);
          z-index: -2;
          filter: blur(10px);
          transform: rotate(0deg);
          transition: transform 1.5s ease-in-out;
        }
        .gradient-button:hover::before { transform: rotate(180deg); }
        .gradient-button::after {
          content: "";
          position: absolute;
          inset: 3px;
          background: black;
          border-radius: 47px;
          z-index: -1;
          filter: blur(5px);
        }
        .dark .gradient-button::after { background: #1c1c1e; }
        .gradient-text {
          color: transparent;
          background: conic-gradient(from 0deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3, #ff6b6b);
          background-clip: text;
          -webkit-background-clip: text;
          filter: hue-rotate(0deg);
          z-index: 10;
        }
        .gradient-button:hover .gradient-text { animation: hue-rotating 2s linear infinite; }
        .gradient-button:active { transform: scale(0.99); }

        /* ==================== PAY BUTTON CSS ==================== */
        .pay-btn {
          position: relative;
          padding: 12px 24px;
          font-size: 16px;
          background: #1a1a1a;
          color: white;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          transition: all 0.3s ease;
        }
        .pay-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }
        .icon-container { position: relative; width: 24px; height: 24px; }
        .icon { position: absolute; top: 0; left: 0; width: 24px; height: 24px; color: #22c55e; opacity: 0; visibility: hidden; }
        .default-icon { opacity: 1; visibility: visible; }
        .pay-btn:hover .icon { animation: none; }
        .pay-btn:hover .wallet-icon { opacity: 0; visibility: hidden; }
        .pay-btn:hover .card-icon { animation: iconRotate 2.5s infinite; animation-delay: 0s; }
        .pay-btn:hover .payment-icon { animation: iconRotate 2.5s infinite; animation-delay: 0.5s; }
        .pay-btn:hover .dollar-icon { animation: iconRotate 2.5s infinite; animation-delay: 1s; }
        .pay-btn:hover .check-icon { animation: iconRotate 2.5s infinite; animation-delay: 1.5s; }
        .pay-btn:active .icon { animation: none; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .pay-btn:active .check-icon { animation: checkmarkAppear 0.6s ease forwards; visibility: visible; }
        .btn-text { font-weight: 600; font-family: system-ui, -apple-system, sans-serif; }

        @keyframes iconRotate {
          0% { opacity: 0; visibility: hidden; transform: translateY(10px) scale(0.5); }
          5% { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
          15% { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
          20% { opacity: 0; visibility: hidden; transform: translateY(-10px) scale(0.5); }
          100% { opacity: 0; visibility: hidden; transform: translateY(-10px) scale(0.5); }
        }
        @keyframes checkmarkAppear {
          0% { opacity: 0; transform: scale(0.5) rotate(-45deg); }
          50% { opacity: 0.5; transform: scale(1.2) rotate(0deg); }
          100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* ==================== PRODUCT CARD CSS ==================== */
        .card {
          --bg-card: #27272a;
          --primary: #ff6b35;
          --primary-800: #1a1a2e;
          --primary-shadow: #e85d2b;
          --light: #d9d9d9;
          --zinc-800: #18181b;
          --bg-linear: linear-gradient(0deg, var(--primary) 50%, var(--light) 125%);

          position: relative;
          display: flex;
          flex-direction: column;
          gap: 0.75rem;
          padding: 1rem;
          width: 100%;
          background-color: var(--bg-card);
          border-radius: 1rem;
          transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card .image_container {
          overflow: hidden;
          cursor: pointer;
          position: relative;
          z-index: 5;
          width: 100%;
          height: 12rem;
          background-color: var(--primary-800);
          border-radius: 0.5rem;
        }
        .card .image_container .image {
          position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 3rem; fill: var(--light);
        }
        .card .title {
          overflow: hidden; width: 100%; font-size: 1rem; font-weight: 600; color: var(--light); text-transform: capitalize; white-space: nowrap; text-overflow: ellipsis;
        }
        .card .size { font-size: 0.85rem; color: var(--light); }
        .card .action {
          display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-top: auto;
        }
        .card .price { font-size: 1.3rem; font-weight: 700; color: var(--light); white-space: nowrap; }
        
        /* ==================== STORM CART BUTTON CSS ==================== */
        .storm-btn {
          position: relative;
          margin: 0;
          padding: 0.6em 1em;
          outline: none;
          text-decoration: none;
          display: flex;
          justify-content: center;
          align-items: center;
          cursor: pointer;
          border: none;
          background-color: var(--primary);
          border-radius: 0.5rem;
          color: #fff;
          font-weight: 700;
          font-size: 0.9rem;
          font-family: 'Cairo', sans-serif;
          z-index: 0;
          overflow: hidden;
          transition: all 0.3s cubic-bezier(0.02, 0.01, 0.47, 1);
          width: 100%;
          flex: 1;
        }

        .storm-btn:hover {
          animation: sh0 0.5s ease-in-out both;
          background-color: var(--primaryHover);
        }

        @keyframes sh0 {
          0% { transform: rotate(0deg) translate3d(0, 0, 0); }
          25% { transform: rotate(7deg) translate3d(0, 0, 0); }
          50% { transform: rotate(-7deg) translate3d(0, 0, 0); }
          75% { transform: rotate(1deg) translate3d(0, 0, 0); }
          100% { transform: rotate(0deg) translate3d(0, 0, 0); }
        }

        .storm-btn:hover span {
          animation: storm 0.7s ease-in-out both;
          animation-delay: 0.06s;
        }

        @keyframes storm {
          0% { transform: translate3d(0, 0, 0); }
          25% { transform: translate3d(2px, 0, 0); }
          50% { transform: translate3d(-2px, 0, 0); }
          75% { transform: translate3d(1px, 0, 0); }
          100% { transform: translate3d(0, 0, 0); }
        }

        .storm-btn::before,
        .storm-btn::after {
          content: '';
          position: absolute;
          right: 0;
          bottom: 0;
          width: 100px;
          height: 100px;
          border-radius: 50%;
          background: #fff;
          opacity: 0;
          transition: transform 0.15s cubic-bezier(0.02, 0.01, 0.47, 1), opacity 0.15s cubic-bezier(0.02, 0.01, 0.47, 1);
          z-index: -1;
          transform: translate(100%, -25%) translate3d(0, 0, 0);
        }

        .storm-btn:hover::before,
        .storm-btn:hover::after {
          opacity: 0.15;
          transition: transform 0.2s cubic-bezier(0.02, 0.01, 0.47, 1), opacity 0.2s cubic-bezier(0.02, 0.01, 0.47, 1);
        }

        .storm-btn:hover::before { transform: translate3d(50%, 0, 0) scale(0.9); }
        .storm-btn:hover::after { transform: translate(50%, 0) scale(1.1); }

        /* ==================== GLASS RADIO GROUP CSS ==================== */
        .glass-radio-group {
          --bg: rgba(0, 0, 0, 0.04);
          --text: #64748b;
          display: grid;
          grid-auto-flow: column;
          position: relative;
          background: var(--bg);
          border-radius: 1rem;
          backdrop-filter: blur(12px);
          box-shadow: inset 1px 1px 4px rgba(255, 255, 255, 0.6), inset -1px -1px 6px rgba(0, 0, 0, 0.05), 0 4px 12px rgba(0, 0, 0, 0.05);
          width: max-content;
          min-width: 100%;
          z-index: 10;
        }
        .dark .glass-radio-group {
          --bg: rgba(255, 255, 255, 0.06);
          --text: #e5e5e5;
          box-shadow: inset 1px 1px 4px rgba(255, 255, 255, 0.2), inset -1px -1px 6px rgba(0, 0, 0, 0.3), 0 4px 12px rgba(0, 0, 0, 0.15);
        }
        .glass-radio-group input { display: none; }
        .glass-radio-group label {
          display: flex; align-items: center; justify-content: center;
          padding: 0.8rem 1.2rem; cursor: pointer;
          font-weight: 800; font-size: 0.95rem; color: var(--text);
          position: relative; z-index: 2; transition: color 0.3s ease-in-out;
          white-space: nowrap; height: 100%; text-align: center;
        }
        .glass-radio-group label:hover { color: #ff6b35; }
        .dark .glass-radio-group label:hover { color: white; }
        .glass-radio-group input:checked + label { color: #fff; }
        .glass-glider {
          position: absolute; top: 0; bottom: 0; right: 0; height: 100%;
          border-radius: 1rem; z-index: 1;
          transition: transform 0.4s cubic-bezier(0.37, 1.95, 0.66, 0.56), background 0.4s ease-in-out;
          background: linear-gradient(135deg, #ff6b35, #ff8c42);
          box-shadow: 0 0 15px rgba(255, 107, 53, 0.4), 0 0 10px rgba(255, 255, 255, 0.3) inset;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 1rem; animation: fadeIn 0.3s ease-out;
        }
        .modal-content {
            background: white; border-radius: 2rem;
            width: 100%; max-width: 32rem; max-height: 90vh;
            overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .dark .modal-content { background: #1c1c1e; border: 1px solid rgba(255,255,255,0.05); }

        /* Toast */
        .toast {
            position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
            padding: 1rem 1.5rem; border-radius: 9999px; z-index: 9999;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); backdrop-filter: blur(10px);
        }
        .toast-success { background-color: rgba(16, 185, 129, 0.9); }
        .toast-error { background-color: rgba(239, 68, 68, 0.9); }
        .toast-info { background-color: rgba(59, 130, 246, 0.9); }

        /* Badge */
        .badge {
            position: absolute; top: -5px; right: -5px;
            background: #ef4444; color: white; font-size: 0.7rem; font-weight: bold;
            width: 1.25rem; height: 1.25rem; border-radius: 9999px; display: flex; align-items: center; justify-content: center; border: 2px solid white;
        }
        .dark .badge { border-color: #1c1c1e; }
        .discount-badge {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background: rgba(239, 68, 68, 0.9); color: white; backdrop-filter: blur(4px);
            padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: bold; z-index: 10;
        }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass-nav { background: rgba(28, 28, 30, 0.8); }
    </style>
</head>
<body class="h-full text-slate-800 dark:text-white antialiased overflow-auto flex flex-col transition-colors duration-300">
    <div id="app" class="flex-1 flex flex-col"></div>

    <!-- Firebase SDK (v10 Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB9ip2z9G58FJw9uQhvHoHx-Ew0P_8GkAI",
            authDomain: "soke-c7317.firebaseapp.com",
            projectId: "soke-c7317",
            storageBucket: "soke-c7317.firebasestorage.app",
            messagingSenderId: "1076683825507",
            appId: "1:1076683825507:web:02d32984aa66fac6623356",
            measurementId: "G-QDBPWG099F"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==================== Configuration ====================
        const config = {
            store_name: 'سوقي',
            welcome_message: 'مرحباً بك في سوقي - تجربة تسوق سهلة وسريعة',
        };

        const STORAGE_KEYS = {
            CART: 'souqi_cart',
            CURRENT_USER: 'souqi_current_user',
            THEME: 'souqi_theme'
        };

        const ADMIN_EMAIL = 'noornady00@gmail.com';
        const ADMIN_PASSWORD = 'noornady2007';

        // ==================== State Management ====================
        let state = {
            currentUser: JSON.parse(localStorage.getItem(STORAGE_KEYS.CURRENT_USER)) || null,
            currentView: 'auth',
            cart: JSON.parse(localStorage.getItem(STORAGE_KEYS.CART)) || [],
            products: [],
            orders: [],
            users: [],
            pendingSellers: [],
            categories: [],
            selectedCategory: 'all',
            searchQuery: '',
            adminTab: 'products',
            // Defaulting to dark mode automatically
            theme: localStorage.getItem(STORAGE_KEYS.THEME) || 'dark'
        };

        if (state.currentUser) {
            state.currentView = state.currentUser.role === 'admin' ? 'admin' : (state.currentUser.role === 'seller' ? 'seller' : 'shop');
        }

        function applyTheme() {
            if (state.theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();

        window.toggleTheme = function() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            localStorage.setItem(STORAGE_KEYS.THEME, state.theme);
            applyTheme();
            render();
        }

        // ==================== Global Helper Functions ====================
        window.showToast = function(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast toast-${type} text-white font-bold flex items-center gap-2 text-sm`;
            const icon = type === 'success' ? '<i class="fa-solid fa-circle-check"></i>' : (type === 'error' ? '<i class="fa-solid fa-circle-exclamation"></i>' : '<i class="fa-solid fa-circle-info"></i>');
            toast.innerHTML = `${icon} <span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function validatePhone(phone) {
            const phoneRegex = /^(010|011|012|015)\d{8}$/;
            return phoneRegex.test(phone);
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // ==================== Firebase Realtime Sync ====================
        function initializeDataListeners() {
            onSnapshot(collection(db, "categories"), (snapshot) => {
                state.categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (state.categories.length === 0 && !localStorage.getItem('db_seeded_cats')) {
                    seedInitialCategories();
                    localStorage.setItem('db_seeded_cats', 'true');
                }
                render();
            });

            onSnapshot(collection(db, "products"), (snapshot) => {
                state.products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            });

            onSnapshot(collection(db, "orders"), (snapshot) => {
                state.orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            });

            onSnapshot(collection(db, "users"), (snapshot) => {
                state.users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                state.pendingSellers = state.users.filter(u => u.role === 'seller' && u.status === 'pending');
                render();
            });
        }

        async function seedInitialCategories() {
            const defaultCats = [
                { id: 'electronics', name: 'إلكترونيات', icon: 'fa-mobile-screen', order: 1 },
                { id: 'fashion', name: 'أزياء', icon: 'fa-shirt', order: 2 },
                { id: 'beauty', name: 'تجميل', icon: 'fa-spray-can-sparkles', order: 3 },
                { id: 'home', name: 'المنزل', icon: 'fa-couch', order: 4 },
                { id: 'sports', name: 'رياضة', icon: 'fa-dumbbell', order: 5 }
            ];
            const batch = writeBatch(db);
            defaultCats.forEach(cat => {
                const docRef = doc(db, "categories", cat.id);
                batch.set(docRef, cat);
            });
            await batch.commit();
        }

        window.handleAddCategory = async function(event) {
            event.preventDefault();
            const idInput = document.getElementById('cat-id').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '-');
            const nameInput = document.getElementById('cat-name').value.trim();
            const iconInput = document.getElementById('cat-icon').value.trim() || 'fa-tag';
            if (!idInput || !nameInput) return;
            try {
                await setDoc(doc(db, "categories", idInput), { id: idInput, name: nameInput, icon: iconInput, order: state.categories.length + 1 });
                window.showToast('تمت إضافة القسم بنجاح.');
            } catch (error) { window.showToast('حدث خطأ أثناء إضافة القسم.', 'error'); }
        }

        window.deleteCategory = async function(catId) {
            try {
                await deleteDoc(doc(db, "categories", catId));
                window.showToast('تم حذف القسم بنجاح.');
            } catch (error) { window.showToast('خطأ أثناء عملية الحذف.', 'error'); }
        }

        // ==================== Authentication ====================
        window.handleLogin = function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const role = document.getElementById('login-role').value;

            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                const adminUser = { id: 'admin', email: ADMIN_EMAIL, name: 'المشرف', role: 'admin' };
                state.currentUser = adminUser;
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify(adminUser));
                state.currentView = 'admin';

        function resizeImage(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 600; const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = dataUrl;
            });
        }

            if (files.length + window.productImages.length > 4) { window.showToast('يمكنك إضافة حتى 4 صور فقط.', 'error'); return; }
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = async (e) => { const resized = await resizeImage(e.target.result); window.productImages.push(resized); window.updateImagePreview(); };
                reader.readAsDataURL(file);
            });
        }

        function renderAdminProducts() {

                                <button onclick="confirmDeleteProduct('${p.id}')" class="w-10 h-10 flex items-center justify-center text-slate-400 dark:text-gray-500 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition"><i class="fa-solid fa-trash"></i></button>

                    </tr>

        }

        function renderAdminCategories() {
            return `
                <div class="grid lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-1">
                        <div class="bg-slate-50 dark:bg-iosInputDark rounded-3xl p-6 border border-slate-100 dark:border-white/5">
                            <h3 class="text-lg font-black text-slate-800 dark:text-white mb-5"><i class="fa-solid fa-plus text-primary ml-2"></i> إضافة قسم جديد</h3>
                            <form onsubmit="handleAddCategory(event)" class="space-y-4">
                                <div><label class="block text-sm font-bold text-slate-600 dark:text-gray-400 mb-1 pl-1">المعرف (إنجليزي)</label><input type="text" id="cat-id" class="input-field bg-white dark:bg-iosCardDark" required placeholder="مثال: mobiles"></div>

                                <div><label class="block text-sm font-bold text-slate-600 dark:text-gray-400 mb-1 pl-1">أيقونة (FontAwesome)</label><input type="text" id="cat-icon" class="input-field bg-white dark:bg-iosCardDark" placeholder="مثال: fa-mobile-screen"><p class="text-[10px] text-slate-400 mt-2">استخدم أيقونات FontAwesome المجانية.</p></div>

                                        <div><div class="font-bold text-slate-800 dark:text-white">${c.name}</div><div class="text-xs font-semibold text-slate-500 dark:text-gray-400 font-mono">${c.id}</div></div>
                                    </div>
                                    <button onclick="deleteCategory('${c.id}')" class="w-10 h-10 rounded-xl bg-red-50 dark:bg-[#3a3a3c] text-red-500 hover:bg-red-100 dark:hover:bg-red-900/30 flex items-center justify-center transition opacity-100 md:opacity-0 group-hover:opacity-100 focus:opacity-100"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            `).join('')}
                        </div>
                        `}
                    </div>
                </div>

        function renderAdminOrders() {
            const statusMap = {
                'new': { label: 'جديد', color: 'bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 border-blue-200 dark:border-blue-800' },
                'processing': { label: 'تجهيز', color: 'bg-orange-50 text-orange-600 dark:bg-orange-900/30 dark:text-orange-400 border-orange-200 dark:border-orange-800' },
                'shipped': { label: 'مشحون', color: 'bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400 border-indigo-200 dark:border-indigo-800' },
                'delivered': { label: 'مُسلّم', color: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400 border-emerald-200 dark:border-emerald-800' },
                'cancelled': { label: 'ملغي', color: 'bg-red-50 text-red-600 dark:bg-red-900/30 dark:text-red-400 border-red-200 dark:border-red-800' }

            return `<div class="space-y-5">${state.orders.sort((a,b)=>b.createdAt-a.createdAt).map(o => `
                <div class="border border-slate-200 dark:border-white/10 rounded-3xl p-6 bg-white dark:bg-iosCardDark shadow-sm flex flex-col md:flex-row gap-6 justify-between items-start md:items-center">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="font-black text-xl text-slate-800 dark:text-white">#${o.id.slice(-6).toUpperCase()}</span>
                            <span class="px-3 py-1.5 rounded-xl text-xs font-bold border ${statusMap[o.status].color}">${statusMap[o.status].label}</span>
                        </div>
                        <div class="text-sm font-bold text-slate-500 dark:text-gray-400 mb-1.5"><i class="fa-regular fa-user ml-1"></i> ${o.userName} <span class="mx-2 text-slate-300 dark:text-gray-600">|</span> <i class="fa-solid fa-phone ml-1"></i> ${o.userPhone}</div>
                        <div class="text-sm font-bold text-slate-500 dark:text-gray-400"><i class="fa-solid fa-location-dot ml-1"></i> ${o.userAddress}</div>
                        <div class="mt-4 flex gap-2 overflow-x-auto pb-1">
                            ${o.items.map(i => `<span class="inline-flex bg-slate-50 dark:bg-iosInputDark border border-slate-100 dark:border-white/5 rounded-xl px-3 py-1.5 text-xs font-bold text-slate-700 dark:text-gray-300 whitespace-nowrap">${i.name} (x${i.quantity})</span>`).join('')}
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-4 w-full md:w-auto border-t md:border-t-0 md:border-r border-slate-100 dark:border-white/10 pt-5 md:pt-0 md:pr-8">
                        <div class="text-2xl font-black text-primary">${o.total} <span class="text-sm font-bold text-slate-500 dark:text-gray-400">ج.م</span></div>
                        <div class="flex items-center gap-2 w-full md:w-auto">
                            <select onchange="updateOrderStatus('${o.id}', this.value)" class="input-field py-2.5 px-4 text-sm font-bold w-full md:w-40">
                                <option value="new" ${o.status === 'new' ? 'selected' : ''}>جديد</option>
                                <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>تجهيز الطلب</option>
                                <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>تم الشحن</option>
                                <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>تم التسليم</option>
                                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>إلغاء الطلب</option>
                            </select>
                            <button onclick="confirmDeleteOrder('${o.id}')" class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-xl bg-red-50 dark:bg-red-900/20 text-red-500 hover:bg-red-100 dark:hover:bg-red-900/40 transition"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        function renderAdminSellers() {
            return `
                <h3 class="text-xl font-black text-slate-800 dark:text-white mb-5 border-r-4 border-primary pr-3">طلبات تسجيل البائعين</h3>
                ${state.pendingSellers.length === 0 ? `<div class="bg-slate-50 dark:bg-iosInputDark rounded-2xl p-6 text-center text-slate-500 dark:text-gray-400 font-bold">لا توجد طلبات معلقة حالياً.</div>` : `
                <div class="space-y-4 mb-10">${state.pendingSellers.map(s => `
                    <div class="border border-slate-200 dark:border-white/10 rounded-3xl p-5 flex flex-wrap justify-between items-center gap-5 bg-white dark:bg-iosCardDark">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-500 rounded-2xl flex items-center justify-center text-xl"><i class="fa-solid fa-store"></i></div>
                            <div><div class="font-black text-lg text-slate-800 dark:text-white">${s.name}</div><div class="text-sm font-bold text-slate-500 dark:text-gray-400">${s.email} | ${s.phone}</div></div>

                        </div>
                    </div>`).join('')}</div>
                `}
                
                <h3 class="text-xl font-black text-slate-800 dark:text-white mb-5 border-r-4 border-primary pr-3 mt-10">البائعون المعتمدون</h3>
                <div class="grid sm:grid-cols-2 gap-4">
                    ${state.users.filter(u=>u.role==='seller' && u.status==='approved').map(s => `
                        <div class="border border-slate-100 dark:border-white/5 rounded-3xl p-5 flex items-center justify-between gap-4 bg-slate-50 dark:bg-iosInputDark group">

                        </div>
                    `).join('')}
                </div>
            `;
        }

                                                    </div>
                                                    <div class="flex-1 overflow-hidden">
                                                        <h4 class="font-bold text-[15px] text-slate-800 dark:text-white line-clamp-1 mb-1">${p.name}</h4>
                                                        <p class="text-primary font-black text-lg">${p.price} <span class="text-xs font-bold text-slate-500 dark:text-gray-400">ج.م</span></p>
                                                    </div>
                                                    <button onclick="confirmDeleteProduct('${p.id}')" class="w-10 h-10 rounded-full bg-slate-50 dark:bg-[#3a3a3c] text-slate-400 dark:text-gray-400 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-500 dark:hover:text-red-400 flex items-center justify-center transition opacity-100 md:opacity-0 group-hover:opacity-100 focus:opacity-100"><i class="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (state.currentUser) {
                if (state.currentView === 'admin') app.innerHTML = renderAdminDashboard();
                else if (state.currentView === 'seller') app.innerHTML = renderSellerDashboard();
                else app.innerHTML = renderShopPage();
            } else if (state.currentView === 'shop') {
                app.innerHTML = renderShopPage();
            } else {
                app.innerHTML = renderAuthPage();
                document.querySelectorAll('#auth-tabs button').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('#auth-tabs button').forEach(t => {
                            t.classList.remove('active', 'bg-white', 'dark:bg-iosCardDark', 'text-primary', 'shadow-sm');
                            t.classList.add('text-slate-500', 'dark:text-gray-400');
                        });
                        tab.classList.remove('text-slate-500', 'dark:text-gray-400');
                        tab.classList.add('active', 'bg-white', 'dark:bg-iosCardDark', 'text-primary', 'shadow-sm');
                        document.getElementById('login-form').classList.toggle('hidden', tab.dataset.tab !== 'login');
                        document.getElementById('register-form').classList.toggle('hidden', tab.dataset.tab === 'login');
                    });
                });
            }
        }

        // ==================== Initialize ====================
        initializeDataListeners();
        render();

    </script>
</body>
</html>
